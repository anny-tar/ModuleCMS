<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Ошибка сервера</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .code {
            font-size: clamp(5rem, 20vw, 9rem);
            font-weight: 800;
            line-height: 1;
            color: #e2e8f0;
            letter-spacing: -4px;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 1rem 0 0.5rem;
            color: #1e293b;
        }
        p {
            font-size: 1rem;
            opacity: 0.6;
            max-width: 400px;
            line-height: 1.6;
        }
        a {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.75rem 2rem;
            background: #2563eb;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        a:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="code">500</div>
    <h1>Ошибка сервера</h1>
    <p>Что-то пошло не так. Мы уже знаем об этом и скоро всё исправим.</p>
    <a href="/">На главную</a>
</body>
</html>
