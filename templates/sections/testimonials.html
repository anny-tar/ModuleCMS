<section class="section-testimonials" id="{{ section.pk }}">
    {% if section.title %}
        <h2>{{ section.title }}</h2>
    {% endif %}
    <div class="testimonials-grid">
        {% for item in data.items %}
            <div class="testimonial-card">
                <p class="testimonial-text">{{ item.text }}</p>
                <p class="testimonial-author">{{ item.name }}</p>
            </div>
        {% endfor %}
    </div>
</section>
