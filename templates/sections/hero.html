{% load media_tags %}
<section class="section section-hero" id="section-{{ section.pk }}">
    {% if data.image_id %}
        {% get_media data.image_id as hero_image %}
        {% if hero_image %}
            <img class="section-hero__bg" src="{{ hero_image.url }}" alt="">
        {% endif %}
    {% endif %}
    <div class="section-hero__inner container">
        <h1 class="section-hero__title">{{ data.heading }}</h1>
        {% if data.subheading %}
            <p class="section-hero__sub">{{ data.subheading }}</p>
        {% endif %}
        {% if data.button_text and data.button_url %}
            <a href="{{ data.button_url }}" class="btn">{{ data.button_text }}</a>
        {% endif %}
    </div>
</section>
