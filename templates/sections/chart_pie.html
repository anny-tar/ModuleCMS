<section class="section-chart-pie" id="{{ section.pk }}">
    {% if section.title %}
        <h2>{{ section.title }}</h2>
    {% endif %}
    {% if data.title %}
        <h3>{{ data.title }}</h3>
    {% endif %}
    <canvas id="chart-{{ section.id }}"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        new Chart(document.getElementById('chart-{{ section.id }}'), {
            type: 'pie',
            data: {
                labels: [{% for item in data.items %}'{{ item.label }}',{% endfor %}],
                datasets: [{
                    data: [{% for item in data.items %}{{ item.value }},{% endfor %}]
                }]
            }
        });
    </script>
</section>
