<section class="section section-chart-pie" id="section-{{ section.pk }}">
    <div class="container">
        {% if section.title %}
            <h2 class="section__title">{{ section.title }}</h2>
        {% endif %}
        {% if data.title %}
            <h3 style="text-align:center; margin-bottom:1.5rem; opacity:0.75;">{{ data.title }}</h3>
        {% endif %}
        <div class="chart-wrapper">
            <canvas id="chart-{{ section.pk }}"></canvas>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        new Chart(document.getElementById('chart-{{ section.pk }}'), {
            type: 'pie',
            data: {
                labels: [{% for item in data.items %}'{{ item.label }}',{% endfor %}],
                datasets: [{
                    data: [{% for item in data.items %}{{ item.value }},{% endfor %}],
                    borderWidth: 2,
                    borderColor: '#fff',
                }]
            },
            options: {
                plugins: {
                    legend: { position: 'bottom', labels: { padding: 20 } }
                }
            }
        });
    </script>
</section>
