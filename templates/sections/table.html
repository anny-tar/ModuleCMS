<section class="section-table">
    {% if section.title %}
        <h2>{{ section.title }}</h2>
    {% endif %}
    <table>
        {% if data.headers %}
            <thead>
                <tr>
                    {% for header in data.headers %}
                        <th>{{ header }}</th>
                    {% endfor %}
                </tr>
            </thead>
        {% endif %}
        <tbody>
            {% for row in data.rows %}
                <tr>
                    {% for cell in row %}
                        <td>{{ cell }}</td>
                    {% endfor %}
                </tr>
            {% endfor %}
        </tbody>
    </table>
</section>
