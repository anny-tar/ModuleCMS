<section class="section section-cards" id="section-{{ section.pk }}">
    <div class="container">
        {% if section.title %}
            <h2 class="section__title">{{ section.title }}</h2>
        {% endif %}
        <div class="cards-grid">
            {% for item in data.items %}
                <div class="card">
                    {% if item.icon %}
                        <div class="card__icon">{{ item.icon }}</div>
                    {% endif %}
                    <h3 class="card__title">{{ item.title }}</h3>
                    {% if item.text %}
                        <div class="card__text ql-content">{{ item.text|safe }}</div>
                    {% endif %}
                </div>
            {% endfor %}
        </div>
    </div>
</section>
