<section class="section section-steps" id="section-{{ section.pk }}">
    <div class="container">
        {% if section.title %}
            <h2 class="section__title">{{ section.title }}</h2>
        {% endif %}
        <div class="steps-list steps-list--{{ data.direction|default:'vertical' }}">
            {% for item in data.items %}
                <div class="step-item">
                    {% if data.direction == 'horizontal' %}
                        <div class="step-connector"></div>
                    {% endif %}
                    <div class="step-body">
                        <h3 class="step-title">{{ item.title }}</h3>
                        {% if item.description %}
                            <div class="step-desc ql-content">{{ item.description|safe }}</div>
                        {% endif %}
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</section>
