<section class="section section-text" id="section-{{ section.pk }}">
    <div class="container">
        {% if section.title %}
            <h2 class="section__title">{{ section.title }}</h2>
        {% endif %}
        <div class="section-text__body ql-content">
            {{ data.content|safe }}
        </div>
    </div>
</section>
